<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo - Login</title>
    <link rel="stylesheet" href="styles/index.css" />
</head>

<body>
    <div class="phone-shell">
        <div class="phone-notch"></div>
        <div class="phone-screen">
            <div class="login-screen">

                <!-- Brand -->
                <div class="brand">
                    <div class="brand-icon">💳</div>
                    <span class="brand-name">Payoo</span>
                </div>

                <!-- Heading -->
                <div class="login-heading">
                    <h1>Welcome back 👋</h1>
                    <p>Sign in to your account</p>
                </div>

                <!-- Form -->
                <form>
                    <div class="form-group">
                        <label class="form-label" for="phone">Mobile Number</label>
                        <input id="phone" class="form-input" type="tel" placeholder="01xxxxxxxxx" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="pin">4-Digit PIN</label>
                        <input id="pin" class="form-input" type="password" placeholder="••••" maxlength="4"
                            autocomplete="current-password" required />
                        <a href="#" class="forgot-link">Forgot PIN?</a>
                    </div>

                    <button id="btn-login" class="btn-login">Sign In</button>
                </form>

                <div class="screen-footer">Secured 🔒</div>
            </div>
        </div>
    </div>

    <!-- javascript file -->
    <script src="js/login.js"></script>
</body>

</html>
